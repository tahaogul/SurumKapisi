# SürümKapısı Helm Chart — Varsayılan Değerler

replicaCount: 2

image:
  repository: surumkapisi/server
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "30"
  hosts:
    - host: surumkapisi.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: surumkapisi-tls
      hosts:
        - surumkapisi.example.com

config:
  adminToken: "CHANGE-ME-IN-PRODUCTION"
  listenAddr: ":8080"
  signingKeyPath: "/app/keys"

postgresql:
  enabled: true
  auth:
    database: surumkapisi
    username: skuser
    password: skpass123
  primary:
    persistence:
      size: 10Gi

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

persistence:
  signingKeys:
    enabled: true
    size: 100Mi
    storageClass: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
