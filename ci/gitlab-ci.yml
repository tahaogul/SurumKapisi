# GitLab CI/CD — SürümKapısı Entegrasyonu
# Bu dosyayı projenizin kök dizinine .gitlab-ci.yml olarak kopyalayın.

stages:
  - build
  - security-gate
  - sign
  - report

variables:
  SK_SERVER_URL: "https://surumkapisi.sirketiniz.com"
  SK_TOKEN: $SURUMKAPISI_TOKEN
  SK_PROJECT_ID: $SURUMKAPISI_PROJECT_ID
  SURUMKAPISI_VERSION: "1.0.0"

# SBOM oluştur ve politika değerlendir
security-gate:
  stage: security-gate
  image: golang:1.22-alpine
  before_script:
    - apk add --no-cache git curl
    - go install github.com/surumkapisi/surumkapisi/cmd/agent@latest || true
    # Alternatif: önceden derlenmiş binary
    # - curl -Lo /usr/local/bin/surumkapisi ${SK_SERVER_URL}/downloads/surumkapisi-linux-amd64
    # - chmod +x /usr/local/bin/surumkapisi
  script:
    # 1. SBOM oluştur
    - surumkapisi sbom --project . --out sbom.json

    # 2. Politikayı değerlendir (FAIL durumunda exit code 2 döner, pipeline durur)
    - surumkapisi evaluate
        --sbom sbom.json
        --server $SK_SERVER_URL
        --token $SK_TOKEN
        --project-id $SK_PROJECT_ID
        --policy .surumkapisi.yml

  artifacts:
    paths:
      - sbom.json
      - .surumkapisi-build-id
    when: always
    expire_in: 30 days

# Artifact imzala (sadece gate geçerse)
sign-artifact:
  stage: sign
  image: golang:1.22-alpine
  needs:
    - job: security-gate
      artifacts: true
  before_script:
    - apk add --no-cache git curl
  script:
    - surumkapisi sign
        --artifact app.jar
        --server $SK_SERVER_URL
        --token $SK_TOKEN
  only:
    - main
    - tags

# Rapor oluştur
generate-report:
  stage: report
  image: golang:1.22-alpine
  needs:
    - job: security-gate
      artifacts: true
  script:
    - surumkapisi report
        --server $SK_SERVER_URL
        --token $SK_TOKEN
        --format html
    - surumkapisi report
        --server $SK_SERVER_URL
        --token $SK_TOKEN
        --format json
  artifacts:
    paths:
      - report-*.html
      - report-*.json
    expire_in: 90 days
  when: always
